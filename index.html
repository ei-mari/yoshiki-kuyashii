<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HOME | 学習ページ</title>
  <style>
    :root{
      --bg0:#0f172a;
      --bg1:#101d33;
      --bg2:#f5efe7;
      --bg3:#eef3f8;
      --card:#ffffff;
      --text:#101114;
      --muted:rgba(16,17,20,.68);
      --line:rgba(16,17,20,.10);
      --shadow:0 22px 60px rgba(15,23,42,.18);
      --shadow2:0 12px 28px rgba(15,23,42,.14);
      --radius:28px;
      --accent:#7c3aed;
      --accent2:#c2410c;
      --accent3:#0369a1;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(124,58,237,.22), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(3,105,161,.18), transparent 26%),
        radial-gradient(circle at 76% 82%, rgba(194,65,12,.14), transparent 28%),
        linear-gradient(160deg, var(--bg0), var(--bg1) 45%, var(--bg2) 45%, var(--bg3));
      min-height:100vh;
    }
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .shell{
      width:min(980px, 100%);
      display:grid;
      gap:18px;
    }
    .hero{
      background:rgba(255,255,255,.86);
      border:1px solid rgba(255,255,255,.5);
      box-shadow:var(--shadow);
      border-radius:34px;
      padding:28px;
      backdrop-filter: blur(16px) saturate(150%);
      overflow:hidden;
      position:relative;
    }
    .hero:before,
    .hero:after{
      content:"";
      position:absolute;
      border-radius:50%;
      pointer-events:none;
    }
    .hero:before{
      inset:auto -90px -110px auto;
      width:260px;
      height:260px;
      background:radial-gradient(circle, rgba(124,58,237,.18), transparent 66%);
    }
    .hero:after{
      inset:-70px auto auto -90px;
      width:210px;
      height:210px;
      background:radial-gradient(circle, rgba(3,105,161,.14), transparent 64%);
    }
    .eyebrow{
      margin:0 0 10px;
      font-size:12px;
      font-weight:900;
      letter-spacing:.22em;
      color:var(--accent3);
      text-transform:uppercase;
    }
    h1{
      margin:0;
      font-size:clamp(34px, 6vw, 68px);
      line-height:1;
      letter-spacing:-.05em;
      font-family: Georgia, "Times New Roman", serif;
    }
    .lede{
      margin:16px 0 0;
      max-width:760px;
      color:var(--muted);
      line-height:1.8;
      font-size:15px;
    }
    .categoryPanel{
      background:rgba(255,255,255,.9);
      border:1px solid rgba(255,255,255,.56);
      border-radius:24px;
      padding:16px;
      box-shadow:var(--shadow2);
      display:grid;
      gap:12px;
    }
    .categoryHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .categoryTitle{
      margin:0;
      font-size:15px;
      font-weight:900;
      color:var(--text);
    }
    .categoryNote{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
    }
    .categoryButtons{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }
    .categoryBtn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-height:62px;
      padding:14px;
      border-radius:8px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      text-decoration:none;
      box-shadow:0 8px 18px rgba(15,23,42,.08);
      font-weight:900;
    }
    .categoryBtn span{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    @media (max-width:860px){
      .grid{ grid-template-columns:1fr; }
      .categoryButtons{ grid-template-columns:1fr; }
      .hero{ padding:22px; border-radius:28px; }
    }
    .card{
      position:relative;
      border-radius:30px;
      padding:24px;
      min-height:240px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      color:#fff;
      box-shadow:var(--shadow2);
      overflow:hidden;
      isolation:isolate;
      text-decoration:none;
    }
    .card:before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(160deg, rgba(255,255,255,.08), rgba(255,255,255,0));
      z-index:-1;
    }
    .card.kuyashi{
      background:
        radial-gradient(circle at 14% 18%, rgba(255,255,255,.18), transparent 26%),
        linear-gradient(160deg, #111827, #1f2937 55%, #374151);
    }
    .card.questions{
      background:
        radial-gradient(circle at 82% 16%, rgba(255,255,255,.16), transparent 26%),
        linear-gradient(160deg, #5b21b6, #7c3aed 52%, #a855f7);
    }
    .card.medical{
      background:
        radial-gradient(circle at 16% 18%, rgba(255,255,255,.18), transparent 28%),
        linear-gradient(160deg, #0f766e, #2563eb 52%, #0f172a);
    }
    .cardMeta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.16);
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .cardTitle{
      margin:0;
      font-size:clamp(24px, 3vw, 38px);
      line-height:1.08;
      letter-spacing:-.04em;
      font-family: Georgia, "Times New Roman", serif;
    }
    .cardText{
      margin:12px 0 0;
      max-width:520px;
      line-height:1.75;
      font-size:15px;
      color:rgba(255,255,255,.84);
    }
    .cardFoot{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:22px;
    }
    .action{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:12px 16px;
      border-radius:999px;
      background:#fff;
      color:#111;
      font-weight:900;
      text-decoration:none;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
      white-space:nowrap;
    }
    .mini{
      font-size:12px;
      color:rgba(255,255,255,.72);
      line-height:1.5;
    }
    .foot{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      color:rgba(255,255,255,.82);
      font-size:12px;
      padding:0 4px;
    }
    .foot a{
      color:inherit;
      text-decoration:none;
      font-weight:800;
      border-bottom:1px solid rgba(255,255,255,.24);
    }
    body.locked .wrap{ display:none; }
    .lockScreen{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:linear-gradient(160deg, #0f172a, #164e63);
      z-index:20;
    }
    body.locked .lockScreen{ display:flex; }
    .lockBox{
      width:min(100%, 390px);
      background:#fff;
      border-radius:18px;
      padding:22px;
      box-shadow:0 24px 70px rgba(0,0,0,.28);
    }
    .lockBox h2{
      margin:0 0 8px;
      font-size:24px;
      letter-spacing:0;
      font-family:inherit;
    }
    .lockBox p{
      margin:0 0 14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      font-weight:700;
    }
    .lockBox input{
      width:100%;
      height:48px;
      border:1px solid var(--line);
      border-radius:8px;
      padding:0 12px;
      font-size:16px;
      font-weight:800;
    }
    .lockBox button{
      width:100%;
      height:48px;
      margin-top:10px;
      border:0;
      border-radius:8px;
      background:#101114;
      color:#fff;
      font-size:15px;
      font-weight:900;
    }
    .lockError{
      min-height:20px;
      margin-top:8px;
      color:#dc2626;
      font-size:12px;
      font-weight:800;
    }
  </style>
</head>
<body class="locked">
  <section class="lockScreen" aria-label="パスワード入力">
    <form class="lockBox" id="lockForm">
      <h2>パスワード</h2>
      <p>学習ページを見るにはパスワードを入力してください。</p>
      <input id="lockInput" type="password" autocomplete="current-password" inputmode="text" />
      <button type="submit">開く</button>
      <div class="lockError" id="lockError"></div>
    </form>
  </section>
  <div class="wrap">
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">HOME</p>
        <h1>リスニング問題</h1>
        <p class="lede">
          文単準１級の長文音声を、1文ずつ聞いて判定できます。
        </p>
      </section>

      <section class="categoryPanel" aria-label="カテゴリ選択">
        <div class="categoryHead">
          <h2 class="categoryTitle">医療・テクノロジー</h2>
          <span class="categoryNote">長文音声トレーナー</span>
        </div>
        <div class="categoryButtons">
          <a class="categoryBtn" href="./medical-tech-long.html">MT1 <span>頭痛 / 診察</span></a>
          <a class="categoryBtn" href="./medical-tech-2-long.html">MT2 <span>ヨーグルト / 抗生物質</span></a>
          <a class="categoryBtn" href="./medical-tech-3-long.html">MT3 <span>石けん / 安全性</span></a>
        </div>
      </section>

      <div class="foot">
        <span>パスワード入力後に学習できます。</span>
      </div>
    </main>
  </div>
  <script>
    const PAGE_PASSWORD = "ys2026";
    const AUTH_KEY = "mt-simple-password-ok";
    const unlock = () => document.body.classList.remove("locked");
    if(localStorage.getItem(AUTH_KEY) === "yes") unlock();
    document.getElementById("lockForm").addEventListener("submit", (event) => {
      event.preventDefault();
      if(document.getElementById("lockInput").value === PAGE_PASSWORD){
        localStorage.setItem(AUTH_KEY, "yes");
        unlock();
      }else{
        document.getElementById("lockError").textContent = "パスワードが違います。";
      }
    });
  </script>
</body>
</html>
