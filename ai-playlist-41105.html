  <style>
    :root{

      --muted:rgba(16,17,20,.64);
      --line:rgba(16,17,20,.10);
      --shadow:0 14px 40px rgba(16,17,20,.08);
      --shadow2:0 8px 20px rgba(16,17,20,.08);

      --accent:#0f172a;
      --accent2:#9b5b3d;
      --star:#b56a14;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(155,91,61,.16), transparent 34%),
        radial-gradient(circle at 85% 12%, rgba(15,23,42,.08), transparent 30%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    a{ color:inherit; }
    .wrap{
      max-width:1120px;
      margin:0 auto;
      padding:18px 16px 92px;
    }
    .hero{
      background:rgba(255,255,255,.74);
      border:1px solid rgba(255,255,255,.68);
      box-shadow:var(--shadow);
      backdrop-filter:saturate(160%) blur(14px);
      border-radius:28px;
      padding:18px;
      position:relative;
      overflow:hidden;
    }
    .hero:before{
      content:"";
      position:absolute;
      inset:auto -80px -70px auto;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(155,91,61,.18), transparent 68%);
      pointer-events:none;
    }
    .topRow{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }
    .eyebrow{
      margin:0 0 8px;
      font-size:12px;
      font-weight:900;
      letter-spacing:.18em;
      color:var(--accent2);
    }
    h1{
      margin:0;
      font-size:clamp(28px, 4vw, 46px);
      line-height:1.06;
      letter-spacing:-.03em;
    }
    .lede{
      margin:12px 0 0;
      color:var(--muted);
      line-height:1.7;
      max-width:820px;
    }
    .navRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
    }
    .chip, .linkBtn, .btn, .sectionTab{
      border:1px solid var(--line);
      background:rgba(255,255,255,.92);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      box-shadow:var(--shadow2);
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .chip.active, .sectionTab.active, .btn.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
    .heroBar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
      align-items:center;
    }
    .status{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .pill{
      font-size:12px;
      background:rgba(16,17,20,.06);
      color:var(--muted);
      padding:7px 10px;
      border-radius:999px;
      white-space:nowrap;
    }
    .controls{
      margin-top:14px;
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap:12px;
    }
    @media (max-width:860px){
      .controls{ grid-template-columns:1fr; }

    .controlGroup{
      background:rgba(255,255,255,.82);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }

      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    input[type="search"], input[type="number"], select{

      background:#fff;
      border-radius:14px;
      padding:10px 12px;
      font:inherit;
      min-height:42px;

    .sectionBarWrap{

    }
    .sectionBar{
      display:flex;
      gap:8px;

      -webkit-overflow-scrolling:touch;
      padding:4px 2px 8px;
    }
    .sectionTab{
      flex:0 0 auto;
      padding:10px 13px;
    }
    .panelGrid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:14px;
      align-items:start;
    }
    @media (max-width:980px){
      .panelGrid{ grid-template-columns:1fr; }

      background:rgba(255,255,255,.88);

      padding:16px;
      border-bottom:1px solid var(--line);

      padding:18px;

      display:flex;
      flex-direction:column;
      gap:12px;
      justify-content:space-between;

    .nowMeta{

      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .tag{
      font-size:12px;

      background:rgba(16,17,20,.06);

      line-height:1.42;
      letter-spacing:-.02em;
      white-space:pre-wrap;

    .nowSentence.hidden{
      color:transparent;
      text-shadow:0 0 0 rgba(16,17,20,.14);
      user-select:none;
    }
    .nowSentence.hidden::selection{ background:transparent; }
    .nowSentence.hidden .mask{
      display:inline-block;
      width:100%;
      min-height:1.2em;
      background:repeating-linear-gradient(90deg, rgba(16,17,20,.10) 0 12px, transparent 12px 20px);
      border-radius:10px;

    .small{
      font-size:12px;
      color:var(--muted);
    }
    .nowActions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-top:4px;

    .btn{

      background:var(--accent);
      color:#fff;

    .btn.secondary{
      background:rgba(16,17,20,.06);
      color:var(--text);
      box-shadow:none;
    }

      font-size:18px;

    .btn.star.active{

      border-color:var(--star);
      color:#fff;
    }

    </header>

              </div>
              <div class="small" id="nowHint" style="margin-top:10px;">—</div>
            </div>
          </div>
        </div>
      </section>

        </div>
        <div class="panelBody">
          <div class="list" id="list"></div>

    </main>

  I suppose I'm an early bird. It's much better for me to wake up and start my day early, but honestly, I can't stay up late. I've been this way since I was a child. I used to try to stay up late, but I would fall asleep early anyway, and that habit has stayed with me. Sometimes it's a little sad because I can't stay out late with my friends. I get sleepy easily at night, so I often go home early, even when I go out for drinks. As I get older, I find myself getting sleepy earlier and earlier, so I want to keep this lifestyle.

  <h2>#22</h2>

  <h2>#20</h2>

  I want to visit the wineries in Georgia again. Georgia has the oldest wine culture in the world. It started about 8,000 years ago. Georgian winemakers make wine using qvevri. They bury large clay pots in the ground. Natural yeast gives the wine a special taste. In Georgia, wine is not just alcohol. It is part of family life, prayer, and hospitality. The best wine region is Kakheti. The food culture is rich; the people are kind, and the cost of living is low. So I want to visit Georgia again. Last time, I had my agent book a visit to her favorite winery for me.

  <h2>#14 How long can you study daily?</h2>
  At the moment, I study every day. In the morning, I study for 30 minutes right after I wake up and memorize new vocabulary. After I take my son to school, I study again at around 10 a.m. for another 30 minutes at home. During lunch, I listen to Kiwi English podcasts or watch Nadia’s cooking videos for 30 minutes to practice listening. After that, I spend 30 minutes on grammar while I do strength training. Before bed, I review what I studied that day. That’s my daily study routine.

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");

    function stripTags(str){
      return String(str).replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();

    function parseSource(raw){
      const lines = raw.split(/\r?\n/);
      const sections = [];

      let currentSection = null;
      let pendingSentence = null;
      let pendingTitle = null;

      for (const rawLine of lines){
        const line = rawLine.trim();
        if (!line) continue;

        const headingMatch = line.match(/^<h2>(.*?)<\/h2>$/i);
        if (headingMatch){
          const headingText = stripTags(headingMatch[1]);
          const sectionNumberMatch = headingText.match(/^#(\d+)/);
          currentSection = {
            key: sectionNumberMatch ? sectionNumberMatch[1] : headingText,
            label: headingText,
            raw: headingText
          };
          sections.push(currentSection);
          pendingSentence = null;
          pendingTitle = null;
          continue;
        }

        const openMatch = line.match(/^\[open title="([^"]+)"\](.*?)\[\/open\]$/i);
        if (openMatch){
          pendingTitle = stripTags(openMatch[1]);
          pendingSentence = stripTags(openMatch[2]);
          continue;
        }

        const audioMatch = line.match(/^\[audio mp3="([^"]+)"\]\[\/audio\]$/i);
        if (audioMatch && pendingSentence && currentSection){

            sectionKey: currentSection.key,
            sectionLabel: currentSection.label,
            title: pendingTitle || String(idx),
            sentence: pendingSentence,
            audioUrl: audioMatch[1],
            star: false
          });
          pendingSentence = null;
          pendingTitle = null;
          continue;
        }
      }

      return { sections, items };

      .slice()
      .sort((a, b) => Number(b.key) - Number(a.key));
    let items = parsed.items
      .slice()
      .sort((a, b) => {
        const sa = sections.findIndex(s => s.key === a.sectionKey);
        const sb = sections.findIndex(s => s.key === b.sectionKey);
        if (sa !== sb) return sa - sb;
        const na = Number(a.title);
        const nb = Number(b.title);
        if (Number.isFinite(na) && Number.isFinite(nb) && na !== nb) return na - nb;
        return String(a.title).localeCompare(String(b.title), "en");
      });
    let playlist = [];
    let index = -1;
    let running = false;
    let gapTimer = null;

    function syncStarState(){
      for (const item of items){
        item.star = !!progress[item.id]?.starred;
      }
    }

    function ensureProgress(){
      for (const item of items){
        if (!progress[item.id]){
          progress[item.id] = {
            starred: false,
            played: 0,
            lastPlayedAt: null
          };
        }
      }
      saveProgress();
      syncStarState();
    }

    function normalizeSectionFilter(){
      if (settings.section === "all" || settings.section === "review") return;
      if (!sections.some(s => s.key === String(settings.section))){
        settings.section = "all";
        saveSettings();
      }
    }

    function isStarred(id){
      return !!progress[id]?.starred;
    }

    function currentSectionLabel(){
      if (settings.section === "all") return "All";
      if (settings.section === "review") return "REVIEW ★";
      const found = sections.find(s => s.key === String(settings.section));
      return found ? found.label : String(settings.section);
    }

    function toggleStar(id){
      progress[id].starred = !progress[id].starred;
      saveProgress();
      syncStarState();
      return progress[id].starred;
    }

    function inSection(item){
      if (settings.section === "all") return true;
      if (settings.section === "review") return isStarred(item.id);
      return item.sectionKey === String(settings.section);
    }

    function getFilteredItems(){
      const q = searchInput.value.trim().toLowerCase();
      const base = items.filter(inSection);
      if (!q) return base;
      return base.filter(item =>
        item.sectionLabel.toLowerCase().includes(q) ||
        item.title.toLowerCase().includes(q) ||
        item.sentence.toLowerCase().includes(q)
      );
    }

    function renderSectionTabs(){
      sectionBarEl.innerHTML = "";

      const makeTab = (label, value) => {
        const btn = document.createElement("button");
        btn.className = "sectionTab" + (settings.section === value ? " active" : "");
        btn.textContent = label;
        btn.onclick = () => {
          settings.section = value;
          saveSettings();
          normalizeSectionFilter();
          syncStarState();
          renderSectionTabs();
          renderAll();
          showToast(value === "review" ? "REVIEW表示" : "Section変更");
        };
        sectionBarEl.appendChild(btn);
      };

      makeTab("All", "all");
      makeTab("REVIEW ★", "review");
      for (const section of sections){
        makeTab(section.label, section.key);
      }
    }

    function updateCounters(){
      const filtered = getFilteredItems();
      const starredCount = items.filter(x => isStarred(x.id)).length;
      statusEl.textContent = `cards ${filtered.length} / ${items.length}`;
      filterInfoEl.textContent = `Section: ${currentSectionLabel()}`;
      starInfoEl.textContent = `★ ${starredCount}`;
      reviewBtn.classList.toggle("active", settings.section === "review");
    }

    function renderList(){
      const filtered = getFilteredItems();
      listEl.innerHTML = "";
      if (!filtered.length){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "該当するカードがありません。";
        listEl.appendChild(empty);
        return;
      }

      filtered.forEach((item, idx) => {
        const row = document.createElement("article");
        row.className = "item";
        const starred = isStarred(item.id);
        row.innerHTML = `
          <div class="itemTop">
            <p class="itemSentence"><strong>${escapeHtml(item.sectionLabel)}</strong> ${escapeHtml(item.sentence)}</p>
            <div class="itemBtns">
              <button class="miniBtn star ${starred ? "active" : ""}" data-star="${escapeHtml(item.id)}">${starred ? "★" : "☆"}</button>
              <button class="miniBtn" data-play="${escapeHtml(item.id)}">▶︎</button>
            </div>
          </div>
          <div class="itemMeta">
            <span>${escapeHtml(item.title)}</span>
            <span>•</span>
            <span>${escapeHtml(item.sectionLabel)}</span>
            <span>•</span>
            <span>${idx + 1}/${filtered.length}</span>
          </div>
          <div class="audioBar">
            <button class="miniBtn" data-open="${escapeHtml(item.id)}">今のカードへ</button>
          </div>
        `;
        row.querySelectorAll("[data-star]").forEach(btn => {
          btn.addEventListener("click", e => {
            e.stopPropagation();
            const nowStarred = toggleStar(item.id);
            if (settings.section === "review" && !nowStarred){
              renderSectionTabs();
              renderAll();
              showToast("★ を外しました");
              return;
            }
            renderSectionTabs();
            renderAll();
            showToast(nowStarred ? "★ 追加" : "★ 削除");
          });
        });
        row.querySelectorAll("[data-play]").forEach(btn => {
          btn.addEventListener("click", e => {
            e.stopPropagation();
            const i = playlist.findIndex(x => x.id === item.id);
            if (i >= 0) playAt(i);
          });
        });
        row.querySelectorAll("[data-open]").forEach(btn => {
          btn.addEventListener("click", e => {
            e.stopPropagation();
            const i = playlist.findIndex(x => x.id === item.id);
            if (i >= 0) setCurrent(i);
          });
        });
        row.addEventListener("click", () => {
          const i = playlist.findIndex(x => x.id === item.id);
          if (i >= 0) setCurrent(i);
        });
        listEl.appendChild(row);
      });
    }

    function buildPlaylist(keepCurrent = false){
      const filtered = getFilteredItems();
      const currentId = keepCurrent && playlist[index]?.id ? playlist[index].id : null;
      let arr = filtered.slice().sort((a, b) => sections.findIndex(s => s.key === a.sectionKey) - sections.findIndex(s => s.key === b.sectionKey) || a.title.localeCompare(b.title, "en"));

      if (settings.shuffle){
        if (currentId){
          const current = arr.find(x => x.id === currentId);
          arr = arr.filter(x => x.id !== currentId);
          for (let i = arr.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          if (current) arr.unshift(current);
          index = 0;
        } else {
          for (let i = arr.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
        }
      }

      playlist = arr;
      if (keepCurrent && currentId){
        const foundIndex = playlist.findIndex(x => x.id === currentId);
        index = foundIndex >= 0 ? foundIndex : (playlist.length ? 0 : -1);
      } else if (playlist.length === 0){
        index = -1;
      } else if (index < 0 || index >= playlist.length){
        index = 0;
      }

      updateButtons();
      updateNowUI();
    }

    function updateButtons(){
      const hasTracks = playlist.length > 0;
      startBtn.disabled = !hasTracks;
      pauseBtn.disabled = !running;
      prevBtn.disabled = !hasTracks || index <= 0;
      nextBtn.disabled = !hasTracks || index < 0;
      replayBtn.disabled = !hasTracks || index < 0;
      shuffleBtn.disabled = !hasTracks;
      shuffleBtn.textContent = settings.shuffle ? "Shuffle: ON" : "Shuffle: OFF";
      hideToggleBtn.textContent = settings.hideText ? "文字を隠す: ON" : "文字を隠す: OFF";
      loopToggle.checked = !!settings.loop;
      gapSel.value = String(settings.gapSec ?? 4);
      toggleStarBtn.textContent = currentItem() && isStarred(currentItem().id) ? "★ Star" : "☆ Star";
      toggleStarBtn.classList.toggle("active", !!(currentItem() && isStarred(currentItem().id)));
      startBtn.textContent = running ? "▶︎ Running" : (index >= 0 ? "▶︎ Resume" : "▶︎ Start");
    }

    function currentItem(){
      return playlist[index] || null;
    }

    function updateNowUI(){
      const item = currentItem();
      if (!item){
        nowSectionTag.textContent = "—";
        nowIndexTag.textContent = "—";
        nowStarTag.textContent = "—";
        nowSentence.textContent = "再生対象がありません";
        nowSentence.classList.remove("hidden");
        nowHint.textContent = "フィルタを変えるか、REVIEW ★ を外してみてください。";
        updateButtons();
        return;
      }

      const starred = isStarred(item.id);
      nowSectionTag.textContent = item.sectionLabel;
      nowIndexTag.textContent = `#${item.title}`;
      nowStarTag.textContent = starred ? "★ starred" : "☆ not starred";
      nowSentence.textContent = item.sentence;
      nowSentence.classList.toggle("hidden", !!settings.hideText);
      nowHint.textContent = `${item.audioUrl}`;
      updateButtons();
    }

    function setCurrent(i){
      index = i;
      running = false;
      updateNowUI();
      updateButtons();
    }

    function clearGap(){
      if (window._gapTimer) clearTimeout(window._gapTimer);
      window._gapTimer = null;
    }

    async function playAt(i){
      clearGap();
      if (!playlist[i]) return;
      index = i;
      running = true;
      updateNowUI();
      const item = playlist[index];
      try{
        audio.src = item.audioUrl;
        audio.currentTime = 0;
        await audio.play();
        progress[item.id].played += 1;
        progress[item.id].lastPlayedAt = new Date().toISOString();
        saveProgress();
      } catch {
        showToast("再生できません");
        window._gapTimer = setTimeout(next, 700);
      }
      updateButtons();
    }

    function scheduleNext(){
      clearGap();
      const gapMs = Math.max(0, Number(settings.gapSec || 0)) * 1000;
      window._gapTimer = setTimeout(next, gapMs);
    }

    function start(){
      if (!playlist.length) return;
      running = true;
      updateButtons();
      if (index < 0 || index >= playlist.length) index = 0;
      playAt(index);
    }

    function pause(){
      clearGap();
      audio.pause();
      running = false;
      updateButtons();
    }

    function next(){
      clearGap();
      if (!playlist.length) return;
      let n = index + 1;
      if (n >= playlist.length){
        if (loopToggle.checked){
          n = 0;
        } else {
          running = false;
          updateButtons();
          showToast("完了");
          return;
        }
      }
      playAt(n);
    }

    function prev(){
      clearGap();
      if (!playlist.length) return;
      const p = Math.max(0, index - 1);
      playAt(p);
    }

    function replay(){
      if (index < 0) return;
      playAt(index);
    }

    function toggleShuffle(){
      settings.shuffle = !settings.shuffle;
      saveSettings();
      buildPlaylist(true);
      renderSectionTabs();
      updateCounters();
      showToast(settings.shuffle ? "Shuffle ON" : "Shuffle OFF");
    }

    function toggleReview(){
      settings.section = settings.section === "review" ? "all" : "review";
      saveSettings();
      renderSectionTabs();
      renderAll();
      showToast(settings.section === "review" ? "REVIEW表示" : "All表示");
    }

    function toggleHideText(){
      settings.hideText = !settings.hideText;
      saveSettings();
      updateNowUI();
      renderList();
    }

    function renderAll(){
      normalizeSectionFilter();
      syncStarState();
      updateCounters();
      buildPlaylist(true);
      renderList();
      renderSectionTabs();
      if (index < 0 && playlist.length) index = 0;
      updateNowUI();
    }

    audio.addEventListener("ended", () => {
      scheduleNext();
    });

    audio.addEventListener("error", () => {
      showToast("読み込みエラー");
      clearGap();
      window._gapTimer = setTimeout(next, 800);
    });

    startBtn.addEventListener("click", start);
    pauseBtn.addEventListener("click", pause);
    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);
    replayBtn.addEventListener("click", replay);
    shuffleBtn.addEventListener("click", toggleShuffle);
    reviewBtn.addEventListener("click", toggleReview);
    hideToggleBtn.addEventListener("click", toggleHideText);
    playBtn.addEventListener("click", () => {
      const item = currentItem();
      if (item) playAt(index);
    });
    toggleStarBtn.addEventListener("click", () => {
      const item = currentItem();
      if (!item) return;
      const starred = toggleStar(item.id);
      renderAll();
      showToast(starred ? "★ 追加" : "★ 削除");
    });
    copyBtn.addEventListener("click", async () => {
      const item = currentItem();
      if (!item) return;
      try{
        await navigator.clipboard.writeText(item.sentence);
        showToast("コピーしました");
      } catch {
        showToast("コピーできませんでした");
      }
    });

    gapSel.addEventListener("change", () => {
      settings.gapSec = Number(gapSel.value);
      saveSettings();
      updateButtons();
      showToast("Gap保存");
    });
    loopToggle.addEventListener("change", () => {
      settings.loop = !!loopToggle.checked;
      saveSettings();
      updateButtons();
      showToast(settings.loop ? "Loop ON" : "Loop OFF");
    });
    searchInput.addEventListener("input", () => {
      updateCounters();
      buildPlaylist(true);
      renderList();
    });
    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      updateCounters();
      buildPlaylist(true);
      renderList();
    });

    function initGap(){
      gapSel.value = String(settings.gapSec ?? 4);
      loopToggle.checked = !!settings.loop;
      hideToggleBtn.textContent = settings.hideText ? "文字を隠す: ON" : "文字を隠す: OFF";
    }

    function boot(){
      buildGapOptions();
      ensureProgress();
      normalizeSectionFilter();
      initGap();
      syncStarState();
      renderSectionTabs();
      updateCounters();
      buildPlaylist(false);
      renderList();
      if (!playlist.length){
        nowSentence.textContent = "原文が読み込めませんでした。";
        nowHint.textContent = "source ブロックを確認してください。";
      }
      if (playlist.length) index = 0;
      updateNowUI();
    }

    boot();
  </script>
</body>
</html>
