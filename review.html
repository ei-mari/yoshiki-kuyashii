<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>REVIEW</title>
  <style>
    :root{
      --bg:#e9eef2;
      --phone:#fbfcfd;
      --ink:#15191d;
      --muted:#69727c;
      --line:rgba(21,25,29,.1);
      --blue:#2563eb;
      --soft:#f2f5f7;
      --red:#dc2626;
      --shadow:0 22px 60px rgba(18,30,44,.18);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100svh;
      display:flex;
      justify-content:center;
      background:linear-gradient(180deg, #d8e4ed 0%, #eef3f6 46%, #dce7ed 100%);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
    }
    .stage{ width:100%; min-height:100svh; display:flex; justify-content:center; padding:10px 0; }
    .phone{
      width:min(100vw,430px);
      height:calc(100svh - 20px);
      background:var(--phone);
      border:1px solid rgba(255,255,255,.8);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-rows:auto auto 1fr;
    }
    .top{
      padding:16px;
      background:linear-gradient(135deg, rgba(37,99,235,.98), rgba(8,145,178,.94));
      color:#fff;
    }
    .topRow{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
    .topLink{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.14);
      color:#fff;
      text-decoration:none;
      font-size:12px;
      font-weight:900;
    }
    .count{
      font-size:12px;
      font-weight:900;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.17);
    }
    .kicker{
      margin:0 0 6px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.12em;
      opacity:.82;
    }
    h1{ margin:0; font-size:26px; line-height:1.15; }
    .filters{
      display:grid;
      gap:8px;
      padding:10px 12px;
      background:#fff;
      border-bottom:1px solid var(--line);
    }
    .sectionSelect{
      width:100%;
      min-height:44px;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--soft);
      color:var(--ink);
      padding:0 12px;
      font-size:15px;
      font-weight:900;
    }
    .filterRow{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .filterRow button{
      min-height:42px;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--soft);
      color:var(--ink);
      font-size:14px;
      font-weight:900;
    }
    .filterRow button.active{
      background:#15191d;
      color:#fff;
      border-color:#15191d;
    }
    .main{
      min-height:0;
      overflow:auto;
      padding:14px;
      background:#f7f9fb;
      display:grid;
      align-content:start;
      gap:10px;
    }
    .reviewCard{
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      padding:12px;
      box-shadow:0 10px 26px rgba(18,30,44,.07);
    }
    .cardHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }
    .mark{ font-size:20px; }
    .judgeMini{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:10px;
    }
    .judgeMini button{
      min-height:42px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      font-size:20px;
      font-weight:900;
    }
    .judgeMini button.active{
      background:#15191d;
      color:#fff;
      border-color:#15191d;
    }
    .en{
      margin:0;
      font-size:17px;
      line-height:1.45;
      font-weight:900;
    }
    .ja{
      display:none;
      margin:8px 0 0;
      color:#3d2a12;
      background:#fff7ed;
      border:1px solid rgba(217,119,6,.24);
      border-radius:8px;
      padding:10px;
      font-size:14px;
      line-height:1.55;
      font-weight:800;
    }
    .ja.show{ display:block; }
    .reviewActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .reviewActions button{
      width:100%;
      min-height:46px;
      border:0;
      border-radius:8px;
      font-size:15px;
      font-weight:900;
    }
    .showJa{
      background:#e0f2fe;
      color:#0f4f66;
    }
    .play{
      background:var(--blue);
      color:#fff;
    }
    .empty{
      border:1px dashed rgba(21,25,29,.18);
      border-radius:8px;
      padding:20px;
      text-align:center;
      color:var(--muted);
      background:#fff;
      font-weight:900;
    }
    body.locked .stage{ display:none; }
    .lockScreen{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:linear-gradient(160deg, #0f172a, #164e63);
      z-index:20;
    }
    body.locked .lockScreen{ display:flex; }
    .lockBox{
      width:min(100%, 390px);
      background:#fff;
      border-radius:18px;
      padding:22px;
      box-shadow:0 24px 70px rgba(0,0,0,.28);
    }
    .lockBox h2{ margin:0 0 8px; font-size:24px; }
    .lockBox p{ margin:0 0 14px; color:var(--muted); font-size:13px; line-height:1.6; font-weight:700; }
    .lockBox input{
      width:100%;
      height:48px;
      border:1px solid var(--line);
      border-radius:8px;
      padding:0 12px;
      font-size:16px;
      font-weight:800;
    }
    .lockBox button{
      width:100%;
      height:48px;
      margin-top:10px;
      border:0;
      border-radius:8px;
      background:#15191d;
      color:#fff;
      font-size:15px;
      font-weight:900;
    }
    .lockError{ min-height:20px; margin-top:8px; color:var(--red); font-size:12px; font-weight:800; }
  </style>
</head>
<body class="locked">
  <section class="lockScreen" aria-label="パスワード入力">
    <form class="lockBox" id="lockForm">
      <h2>パスワード</h2>
      <p>学習ページを見るにはパスワードを入力してください。</p>
      <input id="lockInput" type="password" autocomplete="current-password" inputmode="text" />
      <button type="submit">開く</button>
      <div class="lockError" id="lockError"></div>
    </form>
  </section>
  <div class="stage">
    <main class="phone">
      <header class="top">
        <div class="topRow">
          <a class="topLink" href="./index.html">TOP</a>
          <div class="count" id="counter">0</div>
        </div>
        <p class="kicker">CROSS REVIEW</p>
        <h1>REVIEW</h1>
      </header>
      <section class="filters" aria-label="レビュー条件">
        <select class="sectionSelect" id="sectionSelect" aria-label="セクション選択">
          <option value="all">ALL</option>
          <option value="mt1">MT1</option>
          <option value="mt2">MT2</option>
        </select>
        <div class="filterRow" id="markFilters">
          <button type="button" data-mark="all">ALL</button>
          <button type="button" data-mark="ng">❌</button>
          <button type="button" data-mark="mid">🔺</button>
        </div>
      </section>
      <section class="main" id="reviewList" aria-label="レビューリスト"></section>
    </main>
  </div>
  <audio id="audio"></audio>
  <script>
    const PAGE_PASSWORD = "ys2026";
    const AUTH_KEY = "mt-simple-password-ok";
    const unlockPage = () => document.body.classList.remove("locked");
    if(localStorage.getItem(AUTH_KEY) === "yes") unlockPage();
    document.getElementById("lockForm").addEventListener("submit", (event) => {
      event.preventDefault();
      if(document.getElementById("lockInput").value === PAGE_PASSWORD){
        localStorage.setItem(AUTH_KEY, "yes");
        unlockPage();
      }else{
        document.getElementById("lockError").textContent = "パスワードが違います。";
      }
    });

    const marks = { ok:"⭕️", mid:"🔺", ng:"❌" };
    let sectionFilter = "all";
    let markFilter = "all";

    const sections = [
      {
        id:"mt1",
        label:"MT1",
        storageKey:"medical-tech-long-1-status",
        lines:[
          { speaker:"Doctor", text:"What seems to be the problem, Mrs. Jones?", ja:"どこが悪いのですか、ジョーンズさん。", audio:"./iryo_natural_blocks/01_What_seems_to_be_the_problem_Mrs_Jones.mp3" },
          { speaker:"Mrs. Jones", text:"Recently, Doctor, I’ve become prone to getting headaches.", ja:"先生、最近、頭痛になりやすいんです。", audio:"./iryo_natural_blocks/02_Recently_Doctor_Ive_become_prone_to_getting_headaches.mp3" },
          { speaker:"Mrs. Jones", text:"Sometimes they wear off quite quickly, but at other times they linger all day.", ja:"すぐに治るときもあるのですが、一日中続くときもあります。", audio:"./iryo_natural_blocks/03_Sometimes_they_wear_off_quite_quickly_but_at_other_time.mp3" },
          { speaker:"Doctor", text:"I see. Let me ask you a few questions. Do you find yourself vomiting or becoming dizzy?", ja:"分かりました。いくつか質問をさせてください。吐いたり、めまいがしたりしますか。", audio:"./iryo_natural_blocks/04_I_see_Let_me_ask_you_a_few_questions_Do_you_find_yourse.mp3" },
          { speaker:"Mrs. Jones", text:"No. It’s more like a severe pain all around my head.", ja:"いいえ。それよりも頭全体に激痛が走る感じです。", audio:"./iryo_natural_blocks/05_No_Its_more_like_a_severe_pain_all_around_my_head.mp3" },
          { speaker:"Doctor", text:"It’s most likely you are suffering from tension headaches.", ja:"緊張性頭痛で苦しまれている可能性が一番高いですね。", audio:"./iryo_natural_blocks/06_Its_most_likely_you_are_suffering_from_tension_headache.mp3" },
          { speaker:"Doctor", text:"To be honest, no one knows what causes them, although some speculate that the problem is chemical.", ja:"正直に申しますと、その原因は分かっていないのです。もっとも、問題は化学作用によるものだと推測する人もいます。", audio:"./iryo_natural_blocks/07_To_be_honest_no_one_knows_what_causes_them_although_som.mp3" },
          { speaker:"Doctor", text:"Diverse factors can trigger this kind of headache. Luckily, they are usually harmless, although painful, of course.", ja:"さまざまな要因がこの種の頭痛を誘発し得ます。幸いにして、普通は害はありません。もちろん、痛みはありますが。", audio:"./iryo_natural_blocks/08_Diverse_factors_can_trigger_this_kind_of_headache_Lucki.mp3" },
          { speaker:"Mrs. Jones", text:"Could it be an allergy?", ja:"アレルギーの可能性はありますか。", audio:"./iryo_natural_blocks/09_Could_it_be_an_allergy.mp3" },
          { speaker:"Doctor", text:"It might be. Sometimes chocolate or cheese can bring on these headaches, though it is more likely to be stress or exhaustion.", ja:"あり得ますね。チョコレートやチーズがこういった頭痛を引き起こすことがあります。もっとも、ストレスや極度の疲労による可能性の方が高いのですが。", audio:"./iryo_natural_blocks/10_It_might_be_Sometimes_chocolate_or_cheese_can_bring_on.mp3" },
          { speaker:"Mrs. Jones", text:"I have been having difficulty sleeping and I am very busy at work.", ja:"最近よく眠れないし、仕事がとても忙しいんです。", audio:"./iryo_natural_blocks/11_I_have_been_having_difficulty_sleeping_and_I_am_very_bu.mp3" },
          { speaker:"Doctor", text:"I’ll prescribe some painkillers and sleeping pills for you.", ja:"痛み止めと睡眠薬を処方しておきましょう。", audio:"./iryo_natural_blocks/12_Ill_prescribe_some_painkillers_and_sleeping_pills_for_y.mp3" },
          { speaker:"Doctor", text:"I would also advise you to abstain from alcohol and tobacco, as these can aggravate the pain.", ja:"それからお酒とたばこを控えることを勧めます。痛みを悪化させる可能性がありますからね。", audio:"./iryo_natural_blocks/13_I_would_also_advise_you_to_abstain_from_alcohol_and_tob.mp3" },
          { speaker:"Doctor", text:"Overall, try and relax. You might also find getting neck massages helpful. If these do not help, come back and see me again.", ja:"概してリラックスするように努めてください。首のマッサージをしてもらうのも役に立つかもしれませんね。もしそれでも効果がなければ、また来て診察を受けてください。", audio:"./iryo_natural_blocks/14_Overall_try_and_relax_You_might_also_find_getting_neck.mp3" }
        ]
      },
      {
        id:"mt2",
        label:"MT2",
        storageKey:"medical-tech-long-2-status",
        lines:[
          { speaker:"A", text:"Ross, you are studying pharmacy, right?", ja:"ロス、あなたは薬学を勉強しているんですよね。", audio:"./iryo_tech2_audio/01_Ross_you_are_studying_pharmacy_right.mp3" },
          { speaker:"A", text:"I have a question. Recently, eating yogurt has become quite trendy among consumers.", ja:"質問があります。最近、消費者の間でヨーグルトを食べることがかなり流行しています。", audio:"./iryo_tech2_audio/02_I_have_a_question_Recently_eating_yogurt.mp3" },
          { speaker:"A", text:"Some companies advertise that their yogurts endow you with more vitality and help you with your digestion. Are these claims true?", ja:"自社のヨーグルトは活力を高め、消化を助けると宣伝している会社もあります。こうした主張は本当ですか。", audio:"./iryo_tech2_audio/03_Some_companies_advertise_claims_true.mp3" },
          { speaker:"Ross", text:"Actually, the evidence is a bit contradictory.", ja:"実は、証拠は少し矛盾しています。", audio:"./iryo_tech2_audio/04_Actually_the_evidence_is_contradictory.mp3" },
          { speaker:"Ross", text:"Some experts are saying these companies are exaggerating and that it is difficult to find any tangible evidence that yogurt makes you healthier.", ja:"こうした会社は誇張しており、ヨーグルトが健康にするという明確な証拠を見つけるのは難しいと言う専門家もいます。", audio:"./iryo_tech2_audio/05_Some_experts_are_saying_companies_exaggerating.mp3" },
          { speaker:"A", text:"So it’s really a lot of fuss about nothing, then?", ja:"では、実際には大したことではないのに大騒ぎしているだけなのですか。", audio:"./iryo_tech2_audio/06_Fuss_about_nothing_then.mp3" },
          { speaker:"Ross", text:"Well, one recent study has shown that yogurt can help old people who take antibiotics.", ja:"そうですね、最近のある研究では、ヨーグルトは抗生物質を服用している高齢者に役立つことが示されています。", audio:"./iryo_tech2_audio/07_Yogurt_can_help_old_people_antibiotics.mp3" },
          { speaker:"Ross", text:"One of the attendant hazards of taking antibiotics is that it can cause an upset stomach.", ja:"抗生物質を服用することに伴う危険の一つは、胃の不調を引き起こすことです。", audio:"./iryo_tech2_audio/08_Attendant_hazards_of_taking_antibiotics.mp3" },
          { speaker:"Ross", text:"This is because antibiotics have a very drastic effect, destroying good as well as harmful bacteria in the stomach.", ja:"これは、抗生物質が非常に強い作用を持ち、胃の中の有害な細菌だけでなく良い細菌も破壊してしまうからです。", audio:"./iryo_tech2_audio/09_Antibiotics_have_a_drastic_effect.mp3" },
          { speaker:"A", text:"What does this have to do with yogurt?", ja:"それはヨーグルトとどんな関係があるのですか。", audio:"./iryo_tech2_audio/10_What_does_this_have_to_do_with_yogurt.mp3" },
          { speaker:"Ross", text:"Some researchers showed that eating yogurt can replace the good bacteria destroyed by antibiotics.", ja:"ヨーグルトを食べることで、抗生物質によって破壊された良い細菌を補えることを示した研究者もいます。", audio:"./iryo_tech2_audio/11_Eating_yogurt_can_replace_good_bacteria.mp3" },
          { speaker:"Ross", text:"Moreover, as a form of treatment, it is relatively inexpensive.", ja:"さらに、治療法の一つとしては比較的安価です。", audio:"./iryo_tech2_audio/12_Relatively_inexpensive_treatment.mp3" },
          { speaker:"A", text:"So it is good for you?", ja:"では、体に良いということですか。", audio:"./iryo_tech2_audio/13_So_it_is_good_for_you.mp3" },
          { speaker:"Ross", text:"It can complement the diet of old people.", ja:"高齢者の食事を補うことはできます。", audio:"./iryo_tech2_audio/14_Complement_the_diet_of_old_people.mp3" },
          { speaker:"Ross", text:"But it is probably irrelevant to healthy young people, who can fight off most illnesses without its help.", ja:"しかし、ヨーグルトの助けがなくてもほとんどの病気を撃退できる健康な若者には、おそらく関係がありません。", audio:"./iryo_tech2_audio/15_Irrelevant_to_healthy_young_people.mp3" }
        ]
      }
    ];

    function loadStatus(key){
      try{ return JSON.parse(localStorage.getItem(key)) || {}; }catch{ return {}; }
    }

    function saveStatus(key, status){
      localStorage.setItem(key, JSON.stringify(status));
    }

    function getItems(){
      return sections.flatMap((section) => {
        const status = loadStatus(section.storageKey);
        return section.lines.map((line, i) => ({ ...line, section:section.id, sectionLabel:section.label, storageKey:section.storageKey, index:i, number:i + 1, mark:status[i] }));
      }).filter((item) => {
        const sectionOk = sectionFilter === "all" || item.section === sectionFilter;
        const markOk = markFilter === "all" ? ["mid", "ng"].includes(item.mark) : item.mark === markFilter;
        return sectionOk && markOk;
      });
    }

    function render(){
      document.getElementById("sectionSelect").value = sectionFilter;
      document.querySelectorAll("[data-mark]").forEach((button) => button.classList.toggle("active", button.dataset.mark === markFilter));
      const list = document.getElementById("reviewList");
      const items = getItems();
      document.getElementById("counter").textContent = `${items.length}`;
      list.innerHTML = "";
      if(!items.length){
        list.innerHTML = `<div class="empty">対象のセンテンスはありません。</div>`;
        return;
      }
      items.forEach((item) => {
        const card = document.createElement("article");
        card.className = "reviewCard";
        card.innerHTML = `
          <div class="cardHead">
            <span>${item.sectionLabel} / ${item.number} / ${item.speaker}</span>
            <span class="mark">${marks[item.mark]}</span>
          </div>
          <p class="en">${item.text}</p>
          <p class="ja">${item.ja}</p>
          <div class="reviewActions">
            <button class="showJa" type="button">日本語を表示</button>
            <button class="play" type="button">音声を再生</button>
          </div>
          <div class="judgeMini">
            <button type="button" data-status="ok" class="${item.mark === "ok" ? "active" : ""}">⭕️</button>
            <button type="button" data-status="mid" class="${item.mark === "mid" ? "active" : ""}">🔺</button>
            <button type="button" data-status="ng" class="${item.mark === "ng" ? "active" : ""}">❌</button>
          </div>
        `;
        card.querySelector(".showJa").addEventListener("click", (event) => {
          const ja = card.querySelector(".ja");
          ja.classList.toggle("show");
          event.currentTarget.textContent = ja.classList.contains("show") ? "日本語を隠す" : "日本語を表示";
        });
        card.querySelector(".play").addEventListener("click", () => {
          const audio = document.getElementById("audio");
          audio.src = item.audio;
          audio.currentTime = 0;
          audio.play();
        });
        card.querySelectorAll("[data-status]").forEach((button) => {
          button.addEventListener("click", () => {
            const status = loadStatus(item.storageKey);
            status[item.index] = button.dataset.status;
            saveStatus(item.storageKey, status);
            render();
          });
        });
        list.appendChild(card);
      });
    }

    document.getElementById("sectionSelect").addEventListener("change", (event) => {
      sectionFilter = event.target.value;
      render();
    });
    document.querySelectorAll("[data-mark]").forEach((button) => {
      button.addEventListener("click", () => {
        markFilter = button.dataset.mark;
        render();
      });
    });
    render();
  </script>
</body>
</html>
